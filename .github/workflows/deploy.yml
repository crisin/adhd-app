name: Deploy to Server

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          printf 'Host weiber.tunnel\n  HostName ssh.rousseau-lab.de\n  User weiber\n  IdentityFile %s/.ssh/id_ed25519\n  ProxyCommand cloudflared access ssh --hostname %%h\n  StrictHostKeyChecking no\n' "$HOME" > "$HOME/.ssh/config"
          chmod 600 "$HOME/.ssh/config"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync files to server
        run: |
          rsync -avz --delete \
            -e "ssh -F $HOME/.ssh/config" \
            ./ \
            weiber.tunnel:~/adhd-app/

      - name: Deploy via SSH
        run: |
          ssh weiber.tunnel "
            set -e
            cd ~/adhd-app
            docker compose up --build -d
          "
